name: 🐛 Bug Report
description: Report a bug in lazyjira
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the form below.

  - type: input
    id: version
    attributes:
      label: lazyjira version
      description: "Run `lazyjira --version` to find this."
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      description: "Run `python3 --version` to find this."
      placeholder: "3.12.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows (WSL)
        - Windows (native)
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: "A clear description of the bug."
      placeholder: "When I run `lazyjira issues list -p PROJ`, I get..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: "I expected to see a list of issues..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: "Minimal steps to reproduce the behavior."
      value: |
        1. Run `lazyjira ...`
        2. See error
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: Error output
      description: "Paste the full error/traceback here."
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: "Any other context — config setup, screenshots, etc."
    validations:
      required: false
